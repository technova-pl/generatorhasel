    <style>
        :root {
            --primary: #818cf8;
            --accent: #22d3ee;
            --text: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --bg-dark: #020617;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #020617 100%);
            background-attachment: fixed;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 3rem;
            border-radius: 2.5rem;
            box-shadow: 0 40px 100px -20px rgba(0,0,0,0.7);
            width: 100%;
            max-width: 480px;
            animation: fadeIn 0.8s ease-out;
        }

        h2 { 
            text-align: center; 
            margin: 0 0 2rem 0; 
            font-weight: 800; 
            letter-spacing: -2px; 
            font-size: 2rem;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .result-container {
            background: rgba(0, 0, 0, 0.3);
            padding: 1.5rem;
            border-radius: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--glass-border);
        }

        .password-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            gap: 10px;
        }

        #password-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.3rem;
            word-break: break-all;
            color: var(--accent);
            flex-grow: 1;
        }

        #password-display.hidden { -webkit-text-security: disc; }

        .btn-icon {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-icon:hover { 
            background: rgba(255, 255, 255, 0.1); 
            transform: translateY(-2px);
            border-color: var(--accent);
        }

        .strength-meter {
            height: 6px;
            width: 100%;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            overflow: hidden;
        }

        #strength-bar { height: 100%; width: 0%; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); }

        .settings { display: flex; flex-direction: column; gap: 1.2rem; }
        .setting { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-size: 0.95rem;
            padding: 10px 15px;
            background: rgba(255,255,255,0.02);
            border-radius: 12px;
            border: 1px solid transparent;
            transition: 0.3s;
        }
        .setting:hover { border-color: var(--glass-border); background: rgba(255,255,255,0.04); }

        input[type="range"] { 
            width: 100%; 
            accent-color: var(--accent); 
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
            height: 6px;
            appearance: none;
            margin-top: 10px;
        }

        .generate-btn {
            width: 100%;
            padding: 1.3rem;
            margin-top: 2rem;
            border: none;
            border-radius: 1.2rem;
            background: var(--primary);
            color: white;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px -5px rgba(129, 140, 248, 0.4);
        }

        .generate-btn:hover { background: #6366f1; transform: translateY(-2px); box-shadow: 0 15px 30px -5px rgba(129, 140, 248, 0.5); }

        .history-container {
            margin-top: 3rem;
            width: 100%;
            max-width: 480px;
        }

        .history-list {
            list-style: none;
            padding: 0;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            border: 1px solid var(--glass-border);
            overflow: hidden;
        }

        .history-item {
            padding: 18px 25px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .history-item:last-child { border-bottom: none; }
        .history-item:hover { background: rgba(255,255,255,0.03); }

        footer {
            width: 100%;
            margin-top: auto;
            padding: 60px 20px;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            text-align: center;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: 0.3s;
            padding: 8px 16px;
            border-radius: 10px;
            border: 1px solid transparent;
        }

        .footer-links a:hover {
            color: var(--accent);
            border-color: var(--glass-border);
            background: rgba(255,255,255,0.05);
        }

        .footer-copyright {
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.8rem;
            margin-top: 15px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 500px) {
            .container { padding: 2rem; }
            h2 { font-size: 1.6rem; }
        }
    /* Styl Banera Cookies */
.cookie-banner {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 40px);
    max-width: 700px;
    background: rgba(15, 23, 42, 0.9);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 24px;
    padding: 25px;
    z-index: 10000;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    display: none; /* Ukryty domyślnie, JS go pokaże */
    animation: slideUp 0.5s ease-out;
}

.cookie-content {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 30px;
}

.cookie-text strong {
    display: block;
    color: #fff;
    margin-bottom: 5px;
    font-size: 1rem;
}

.cookie-text p {
    margin: 0;
    font-size: 0.85rem;
    color: #94a3b8;
    line-height: 1.5;
}

.cookie-text a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
}

.cookie-btn.accept {
    background: var(--primary);
    color: white;
    border: none;
    padding: 12px 25px;
    border-radius: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.3s;
    white-space: nowrap;
}

.cookie-btn.accept:hover {
    background: #6366f1;
    transform: scale(1.05);
}

@keyframes slideUp {
    from { transform: translate(-50%, 100%); opacity: 0; }
    to { transform: translate(-50%, 0); opacity: 1; }
}

@media (max-width: 600px) {
    .cookie-content { flex-direction: column; text-align: center; gap: 20px; }
}

<div id="cookie-banner" class="cookie-banner">
    <div class="cookie-content">
        <div class="cookie-text">
            <strong>Prywatność i Cookies 🍪</strong>
            <p>Używamy Google Analytics, aby zrozumieć, jak korzystasz z generatora. Dane są anonimowe. 
               Szczegóły w <a href="polityka_prywatnosci.html">Polityce Prywatności</a>.</p>
        </div>
        <div class="cookie-actions">
            <button id="accept-cookies" class="cookie-btn accept">Akceptuję</button>
        </div>
    </div>
</div>

height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->
<div class="container">
    <h2>Generator haseł</h2>
    
    <div class="result-container">
        <div class="password-row">
            <span id="password-display">Ładowanie...</span>
            <div class="action-btns">
                <button class="btn-icon" id="toggle-view" title="Ukryj">👁️</button>
                <button class="btn-icon" id="qr-btn">QR</button>
                <button class="btn-icon" id="copy-btn">📋</button>
            </div>
        </div>
        <div class="strength-meter">
            <div id="strength-bar"></div>
        </div>
    </div>

    <div class="settings">
        <div>
            <label>Długość: <span id="length-val" style="color:var(--accent)">18</span></label>
            <input type="range" id="length" min="8" max="50" value="18">
        </div>
        <div class="setting"><label>Wielkie litery</label><input type="checkbox" id="uppercase" checked></div>
        <div class="setting"><label>Małe litery</label><input type="checkbox" id="lowercase" checked></div>
        <div class="setting"><label>Cyfry</label><input type="checkbox" id="numbers" checked></div>
        <div class="setting"><label>Znaki specjalne</label><input type="checkbox" id="symbols" checked></div>
    </div>

    <button class="generate-btn" id="generate-btn">Generuj Bezpieczne Hasło</button>
</div>

<div class="history-container">
    <p style="margin-left: 10px; font-weight: 600; color: rgba(255,255,255,0.6);">Ostatnie hasła</p>
    <ul class="history-list" id="history-list"></ul>
</div>

<div id="modal-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:none; justify-content:center; align-items:center; z-index:1000; backdrop-filter: blur(5px);">
    <div style="background:var(--card); padding:2rem; border-radius:1.5rem; text-align:center;">
        <div id="qrcode" style="background:white; padding:15px; border-radius:10px;"></div>
        <button class="generate-btn" onclick="document.getElementById('modal-overlay').style.display='none'">Zamknij</button>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
    const banner = document.getElementById('cookie-banner');
    const acceptBtn = document.getElementById('accept-cookies');

    // Funkcja ładująca Google Tag Manager
    function activateGTM() {
        (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
        new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
        j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
        'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
        })(window,document,'script','dataLayer','GTM-PQ7JZSX3');
        
        console.log("GTM został aktywowany.");
    }

    // Sprawdzanie zgody w localStorage
    if (localStorage.getItem('cookies_accepted') === 'true') {
        activateGTM(); // Już zaakceptowano wcześniej
    } else {
        banner.style.display = 'block'; // Pokaż baner, jeśli brak zgody
    }

    // Obsługa kliknięcia "Akceptuję"
    acceptBtn.addEventListener('click', () => {
        localStorage.setItem('cookies_accepted', 'true');
        banner.style.display = 'none';
        activateGTM(); // Aktywuj GTM natychmiast po kliknięciu
    });
});
    const display = document.getElementById('password-display');
    const lengthEl = document.getElementById('length');
    const lengthVal = document.getElementById('length-val');
    const historyList = document.getElementById('history-list');

    const sets = {
        upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
        lower: 'abcdefghijklmnopqrstuvwxyz',
        numbers: '0123456789',
        symbols: '!@#$%^&*()_+~`|}{[]:;?><,./-='
    };

    function updateStrength(pw) {
        let score = 0;
        if (pw.length > 12) score += 30;
        if (/[A-Z]/.test(pw)) score += 20;
        if (/[0-9]/.test(pw)) score += 20;
        if (/[^A-Za-z0-9]/.test(pw)) score += 30;
        
        const bar = document.getElementById('strength-bar');
        bar.style.width = score + '%';
        bar.style.backgroundColor = score < 50 ? '#ef4444' : score < 80 ? '#f59e0b' : '#10b981';
    }

    // ULEPSZONE GENEROWANIE
    function generate() {
        const config = [
            { id: 'uppercase', chars: sets.upper },
            { id: 'lowercase', chars: sets.lower },
            { id: 'numbers', chars: sets.numbers },
            { id: 'symbols', chars: sets.symbols }
        ];

        let activeSets = config.filter(c => document.getElementById(c.id).checked);
        if (activeSets.length === 0) return "Wybierz opcje!";

        let result = [];
        const len = parseInt(lengthEl.value);

        // 1. Gwarancja: po jednym znaku z każdego wybranego typu
        activeSets.forEach(s => {
            const randomByte = window.crypto.getRandomValues(new Uint8Array(1))[0];
            result.push(s.chars[randomByte % s.chars.length]);
        });

        // 2. Reszta znaków całkowicie losowa
        const allChars = activeSets.map(s => s.chars).join('');
        const extraLen = len - result.length;
        const randomValues = window.crypto.getRandomValues(new Uint32Array(extraLen));

        for (let i = 0; i < extraLen; i++) {
            result.push(allChars[randomValues[i] % allChars.length]);
        }

        // 3. Tasowanie Fisher-Yates (żeby znaki gwarantowane nie były zawsze na początku)
        for (let i = result.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [result[i], result[j]] = [result[j], result[i]];
        }

        const finalPw = result.join('');
        display.innerText = finalPw;
        updateStrength(finalPw);
        saveToHistory(finalPw);
    }

    function saveToHistory(pw) {
        let history = JSON.parse(localStorage.getItem('pw_glass_history')) || [];
        history.unshift(pw);
        history = history.slice(0, 5);
        localStorage.setItem('pw_glass_history', JSON.stringify(history));
        renderHistory();
    }

    function renderHistory() {
        const history = JSON.parse(localStorage.getItem('pw_glass_history')) || [];
        historyList.innerHTML = history.map(pw => `
            <li class="history-item">
                <span>${pw.substring(0, 15)}...</span>
                <button onclick="navigator.clipboard.writeText('${pw}'); alert('Skopiowano!')" style="background:none; border:none; cursor:pointer; font-size:1.1rem;">📋</button>
            </li>
        `).join('');
    }

    // Eventy
    document.getElementById('generate-btn').addEventListener('click', generate);
    document.getElementById('toggle-view').addEventListener('click', () => display.classList.toggle('hidden'));
    lengthEl.addEventListener('input', (e) => lengthVal.innerText = e.target.value);
    
    document.getElementById('copy-btn').addEventListener('click', () => {
        navigator.clipboard.writeText(display.innerText);
        const btn = document.getElementById('copy-btn');
        btn.innerText = "✅";
        setTimeout(() => btn.innerText = "📋", 1000);
    });

document.getElementById('qr-btn').addEventListener('click', () => {
    const qrContainer = document.getElementById('qrcode');
    qrContainer.innerHTML = ""; // Czyścimy poprzedni kod
    
    const password = display.innerText;

    // Tworzymy nowy kod QR z jawnym określeniem parametrów
    new QRCode(qrContainer, {
        text: password, // Surowe hasło
        width: 200,
        height: 200,
        colorDark : "#000000",
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.H // Wysoki poziom korekcji błędów
    });

    // Wymuszamy odświeżenie kontenera i pokazujemy modal
    document.getElementById('modal-overlay').style.display = 'flex';
});
    // Start
    renderHistory();
    generate();
</script>
